name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/react

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Typecheck
        run: npm run typecheck

      - name: Build library
        run: npm run build

      - name: Visual regression
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            mcr.microsoft.com/playwright:v1.49.1-jammy \
            bash -lc "npm ci --legacy-peer-deps && cd packages/react && npx playwright install chromium && npm run test:visual"
